name: Build Windows Executable and MSI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build GhostAssetSync for Windows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name:  Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name:  Install dependencies
        run: |
          sudo apt update
          sudo apt install -y nsis wine64 zip
          pip install pyinstaller

      - name: Build Windows EXE with PyInstaller via Wine
        run: |
          pyinstaller --onefile ghostsync.py

      - name:  Create NSIS Installer Script
        run: |
          echo 'Outfile "GhostAssetSync.msi"
          InstallDir "$PROGRAMFILES\\GhostAssetSync"
          Page Directory
          Section
            SetOutPath $INSTDIR
            File "dist\\ghostsync.exe"
          SectionEnd' > ghostsync.nsi

      - name:  Build MSI using NSIS
        run: |
          makensis ghostsync.nsi

      - name:  Package ZIP
        run: |
          mkdir release
          cp dist/ghostsync.exe release/GhostAssetSync.exe
          cp GhostAssetSync.msi release/
          cp settings.conf.example release/
          echo "Run GhostAssetSync.exe or install via GhostAssetSync.msi" > release/README-INSTALL.txt
          zip -r GhostAssetSync-Builds.zip release/

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: GhostAssetSync-Builds.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
