name: Build GhostAssetSync Releases

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: pyinstaller --onefile ghostsync.py

      - name: Package release
        run: |
          mkdir release
          copy dist\ghostsync.exe release\GhostAssetSync.exe
          copy settings.conf.example release\
          echo Run GhostAssetSync.exe after configuring settings.conf > release\README-INSTALL.txt
        shell: cmd

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: GhostAssetSync-Windows
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/GhostAssetSync.exe
            release/settings.conf.example
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS Executable
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary with PyInstaller
        run: pyinstaller --onefile ghostsync.py

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: GhostAssetSync-macOS
          path: dist/ghostsync

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ghostsync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
