name: Build GhostAssetSync Releases

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: pyinstaller --onefile ghostsync.py

      - name: Package release
        run: |
          mkdir release
          copy dist\ghostsync.exe release\GhostAssetSync.exe
          copy settings.conf.example release\
          echo Run GhostAssetSync.exe after configuring settings.conf > release\README-INSTALL.txt
        shell: cmd

      - name: Upload Windows artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: GhostAssetSync-Windows
          path: release/

  build-macos:
    name: Build macOS Executable
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary with PyInstaller
        run: pyinstaller --onefile ghostsync.py

      - name: Upload macOS artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: GhostAssetSync-macOS
          path: dist/ghostsync

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: GhostAssetSync-Windows
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: GhostAssetSync-macOS
          path: artifacts/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: |
            artifacts/windows/GhostAssetSync.exe
            artifacts/windows/settings.conf.example
            artifacts/macos/ghostsync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
